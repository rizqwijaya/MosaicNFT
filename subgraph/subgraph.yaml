specVersion: 1.0.0
description: MosaicNFT marketplace indexer (Sepolia).
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MosaicERC721
    network: sepolia
    source:
      address: "0xaF2aC6bB88ec5cCD406356a8884a818D8e22170C"
      abi: MosaicERC721
      startBlock: 11085853
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Collection
        - Token
        - User
        - Airdrop
        - AirdropClaim
      abis:
        - name: MosaicERC721
          file: ./abis/MosaicERC721.json
      eventHandlers:
        - event: Minted(indexed uint256,indexed address,string)
          handler: handleMinted
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: AirdropCreated(indexed uint256,indexed address,string,uint96,uint64)
          handler: handleAirdropCreated
        - event: AirdropClaimed(indexed uint256,indexed address,indexed uint256)
          handler: handleAirdropClaimed
        - event: AirdropClosed(indexed uint256)
          handler: handleAirdropClosed
      file: ./src/mappings.ts
  - kind: ethereum
    name: MosaicMarket
    network: sepolia
    source:
      address: "0x4E6e96A3D5937FDFe39937a765929fdE87C4F88c"
      abi: MosaicMarket
      startBlock: 11085853
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Collection
        - Token
        - Listing
        - Auction
        - Bid
        - Offer
        - Sale
        - User
      abis:
        - name: MosaicMarket
          file: ./abis/MosaicMarket.json
      eventHandlers:
        - event: ItemListed(indexed address,indexed uint256,indexed address,uint256)
          handler: handleItemListed
        - event: ListingCancelled(indexed address,indexed uint256,indexed address)
          handler: handleListingCancelled
        - event: ItemSold(indexed address,indexed uint256,address,indexed address,uint256)
          handler: handleItemSold
        - event: AuctionCreated(indexed uint256,indexed address,indexed uint256,address,uint256,uint256)
          handler: handleAuctionCreated
        - event: BidPlaced(indexed uint256,indexed address,uint256)
          handler: handleBidPlaced
        - event: AuctionSettled(indexed uint256,indexed address,uint256)
          handler: handleAuctionSettled
        - event: OfferMade(indexed uint256,indexed address,indexed uint256,address,uint256)
          handler: handleOfferMade
        - event: OfferCancelled(indexed uint256)
          handler: handleOfferCancelled
        - event: OfferAccepted(indexed uint256,indexed address,indexed address,uint256)
          handler: handleOfferAccepted
        - event: ProceedsWithdrawn(indexed address,uint256)
          handler: handleProceedsWithdrawn
      file: ./src/mappings.ts
